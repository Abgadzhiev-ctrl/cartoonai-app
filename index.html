<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>CartoonAI — Профиль</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0b1f;
      --card: #1a1630;
      --card2: #221d3a;
      --accent: #7c4dff;
      --accent2: #e040fb;
      --gold: #ffd600;
      --text: #f0ecff;
      --muted: #9e8fcf;
      --radius: 20px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 40px;
      overflow-x: hidden;
    }

    /* ── Шапка ── */
    .header {
      background: linear-gradient(135deg, #1a0533 0%, #2d1b69 50%, #1a0533 100%);
      padding: 28px 20px 80px;
      text-align: center;
      position: relative;
    }
    .header::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; right: 0; height: 60px;
      background: var(--bg);
      border-radius: 50% 50% 0 0 / 60px 60px 0 0;
    }
    .logo {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent2);
      margin-bottom: 20px;
      opacity: 0.9;
    }

    /* ── Аватар ── */
    .avatar-wrap {
      position: relative;
      display: inline-block;
    }
    .avatar {
      width: 90px; height: 90px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--accent);
      box-shadow: 0 0 0 4px rgba(124,77,255,0.25), 0 0 30px rgba(124,77,255,0.4);
    }
    .avatar-placeholder {
      width: 90px; height: 90px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
      border: 3px solid var(--accent);
      box-shadow: 0 0 0 4px rgba(124,77,255,0.25), 0 0 30px rgba(124,77,255,0.4);
    }
    .user-name {
      margin-top: 12px;
      font-size: 22px;
      font-weight: 700;
    }
    .user-tag {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ── Основной блок ── */
    .content {
      padding: 0 16px;
      margin-top: -24px;
      position: relative;
      z-index: 1;
    }

    /* ── Карточки статистики ── */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }
    .stat-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px 16px;
      text-align: center;
      border: 1px solid rgba(124,77,255,0.15);
    }
    .stat-card.full { grid-column: 1 / -1; }
    .stat-icon { font-size: 28px; margin-bottom: 8px; }
    .stat-value {
      font-size: 32px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }
    .stat-label {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
      font-weight: 500;
    }

    /* ── Кредиты ── */
    .credits-card {
      background: linear-gradient(135deg, #1e1040, #2a1060);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
      border: 1px solid rgba(124,77,255,0.3);
      position: relative;
      overflow: hidden;
    }
    .credits-card::before {
      content: '💎';
      position: absolute;
      right: 16px; top: 50%;
      transform: translateY(-50%);
      font-size: 52px;
      opacity: 0.12;
    }
    .credits-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .credits-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .credits-amount {
      font-size: 42px;
      font-weight: 900;
      color: var(--gold);
      line-height: 1;
      margin-bottom: 4px;
    }
    .credits-sub {
      font-size: 13px;
      color: var(--muted);
    }
    .credits-bar-wrap {
      margin-top: 14px;
      background: rgba(255,255,255,0.08);
      border-radius: 10px;
      height: 8px;
      overflow: hidden;
    }
    .credits-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 10px;
      transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
    }

    /* ── Информация о тарифе ── */
    .info-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 16px;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .info-row:last-child { border-bottom: none; }
    .info-key {
      font-size: 14px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .info-val {
      font-size: 14px;
      font-weight: 600;
    }
    .badge {
      background: rgba(124,77,255,0.2);
      color: var(--accent);
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
    }
    .badge.green {
      background: rgba(0,200,83,0.15);
      color: #00c853;
    }

    /* ── Кнопки ── */
    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 700;
      text-align: center;
      border: none;
      cursor: pointer;
      margin-bottom: 10px;
      transition: transform 0.15s, opacity 0.15s;
      text-decoration: none;
    }
    .btn:active { transform: scale(0.97); opacity: 0.9; }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      box-shadow: 0 4px 20px rgba(124,77,255,0.4);
    }
    .btn-outline {
      background: var(--card2);
      color: var(--text);
      border: 1px solid rgba(124,77,255,0.3);
    }

    /* ── Секция ── */
    .section-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin: 20px 0 10px;
    }

    /* ── Skeleton loader ── */
    .skeleton {
      background: linear-gradient(90deg, var(--card) 25%, var(--card2) 50%, var(--card) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">✦ CartoonAI</div>
  <div class="avatar-wrap">
    <div class="avatar-placeholder" id="avatar-placeholder">🎬</div>
    <img class="avatar" id="avatar-img" style="display:none" alt="avatar" />
  </div>
  <div class="user-name" id="user-name">Загрузка...</div>
  <div class="user-tag" id="user-tag">@username</div>
</div>

<div class="content">

  <!-- Кредиты -->
  <div class="credits-card">
    <div class="credits-header">
      <span class="credits-title">💎 Баланс кредитов</span>
    </div>
    <div class="credits-amount" id="credits-amount">—</div>
    <div class="credits-sub">1 кредит = 1 мультфильм</div>
    <div class="credits-bar-wrap">
      <div class="credits-bar" id="credits-bar" style="width:0%"></div>
    </div>
  </div>

  <!-- Статистика -->
  <div class="section-title">Статистика</div>
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-icon">🎬</div>
      <div class="stat-value" id="videos-count">—</div>
      <div class="stat-label">Мультфильмов</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">🎭</div>
      <div class="stat-value" id="char-status">—</div>
      <div class="stat-label">Персонаж</div>
    </div>
  </div>

  <!-- Детали -->
  <div class="section-title">Детали аккаунта</div>
  <div class="info-card">
    <div class="info-row">
      <span class="info-key">💳 Тариф</span>
      <span class="badge">Free</span>
    </div>
    <div class="info-row">
      <span class="info-key">⚡ Статус</span>
      <span class="badge green">Активен</span>
    </div>
    <div class="info-row">
      <span class="info-key">🎬 Качество</span>
      <span class="info-val">Disney Pixar 3D</span>
    </div>
    <div class="info-row">
      <span class="info-key">🎙 Озвучка</span>
      <span class="info-val">Включена</span>
    </div>
  </div>

  <!-- Кнопки -->
  <div class="section-title">Действия</div>
  <button class="btn btn-primary" onclick="closeAndCreate()">🎬 Создать мультфильм</button>
  <button class="btn btn-outline" onclick="closeApp()">← Закрыть</button>

</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();
  tg.enableClosingConfirmation();

  // Тема
  if (tg.colorScheme === 'light') {
    document.documentElement.style.setProperty('--bg', '#f5f0ff');
    document.documentElement.style.setProperty('--card', '#fff');
    document.documentElement.style.setProperty('--text', '#1a1630');
    document.documentElement.style.setProperty('--muted', '#7c5cbf');
  }

  // Данные пользователя Telegram
  const tgUser = tg.initDataUnsafe?.user || {};

  // Данные из URL параметра ?d=BASE64
  let appData = {};
  try {
    const raw = new URLSearchParams(window.location.search).get('d');
    if (raw) appData = JSON.parse(atob(raw));
  } catch (e) {}

  // Имя
  const name = tgUser.first_name
    ? (tgUser.first_name + (tgUser.last_name ? ' ' + tgUser.last_name : ''))
    : (appData.name || 'Пользователь');
  document.getElementById('user-name').textContent = name;
  document.getElementById('user-tag').textContent =
    tgUser.username ? '@' + tgUser.username : 'CartoonAI';

  // Аватар
  if (tgUser.photo_url) {
    const img = document.getElementById('avatar-img');
    img.src = tgUser.photo_url;
    img.onload = () => {
      img.style.display = 'block';
      document.getElementById('avatar-placeholder').style.display = 'none';
    };
  }

  // Кредиты
  const credits = appData.credits ?? 0;
  document.getElementById('credits-amount').textContent = credits;
  const barPct = Math.min(100, Math.round((credits / 10) * 100));
  setTimeout(() => {
    document.getElementById('credits-bar').style.width = barPct + '%';
  }, 300);

  // Видео
  document.getElementById('videos-count').textContent = appData.videos ?? 0;

  // Персонаж
  document.getElementById('char-status').textContent = appData.has_char ? '✅' : '❌';

  // Кнопки
  function closeAndCreate() {
    tg.sendData(JSON.stringify({ action: 'create' }));
  }
  function closeApp() {
    tg.close();
  }
</script>

</body>
</html>
